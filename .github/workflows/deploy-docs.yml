name: Trigger ReadTheDocs Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-rtd:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ReadTheDocs webhook
        if: ${{ secrets.RTD_WEBHOOK_TOKEN != '' }}
        run: |
          curl -X POST \
            -d "token=${{ secrets.RTD_WEBHOOK_TOKEN }}" \
            https://readthedocs.org/api/v2/webhook/cmip7-virtualization/${{ secrets.RTD_WEBHOOK_ID }}/
